interface:
  display_name: "Calibrate"
  short_description: "Two-round, human-relayed design-research engine: an Aside SWEEP into named concepts, then a DEEP TEARDOWN of the chosen concept's best examples — folded into an annotated moodboard and a follow/deviate/refuse conventions audit. The calibration bridge before the three-directions step."
  brand_color: "#475569"

policy:
  allow_implicit_invocation: true
  # Plugin-side orchestrator only. Codex composes each round's mission prompt from canon and
  # relays it through the user to their Aside `design-research` chat — it never does the browsing
  # thinking itself. Never target a count (sites / concepts / teardowns); saturation is the only
  # bar and the depth dial tunes appetite, not counts. Never pick the concept for the user — that
  # is the Step-4 checkpoint. Reference the sibling files; never duplicate their formats. Show the
  # conventions audit + notes before writing (one confirmation pass). Extracted values are evidence
  # for tokens, never copied as tokens. Rule 7 survives: >=1 Phase-5 direction departs from every
  # concept found. Do not pick a direction or write tokens; hand back to design-direction Phase 5
  # via an explicit Skill() call. No auto-chains.

dependencies:
  tools:
    - type: "mcp"
      value: "aside"   # Fallback A only — Codex drives Aside directly via mcp__aside__repl when no
                       # human relay is available: daemon on 127.0.0.1:21420 (launch-and-wait),
                       # never fullPage, never page.evaluate() scroll, one action per call,
                       # ./artifacts -> cp to brain/moodboard/, re-attach on CDP disconnect.
  references:
    - "references/aside-research-skill.md"   # static skill the user installs into Aside once
    - "references/mission-prompt-template.md" # Round-1 / Round-2 prompt templates filled from canon
    - "references/round-formats.md"           # shared block + file formats (single source of truth)
