interface:
  display_name: "UI Research"
  short_description: "Map page-aware UI recommendations from live evidence"
  default_prompt: "Respect the active checkout, site/page map, stable IDs, and reference boundary; return the versioned page-recommendations packet with honest screenshot, video, motion, confidence, gap, and asset evidence; then stop for site-wide dashboard review without creating selections or build locks."

policy:
  allow_implicit_invocation: false

dependencies:
  tools:
    - type: "mcp"
      value: "aside"
  references:
    - "aside-skill/ui-research/SKILL.md"
    - "references/mission-prompt-template.md"
    - "references/round-formats.md"
