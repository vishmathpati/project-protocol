interface:
  display_name: "Build Page"
  short_description: "Compose a whole page (marketing or dashboard) in a long iterative conversation. Reads the brief and canon, proposes a starting plan, iterates with the user, works section by section, calls build-component for net-new primitives, writes the actual page file. Copy is inlined directly from agents/marketing/copy/<slug>.md — no content-mirror file ever created."
  brand_color: "#475569"

policy:
  allow_implicit_invocation: true
