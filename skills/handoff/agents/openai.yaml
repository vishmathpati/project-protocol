interface:
  display_name: "Handoff"
  short_description: "Carry unfinished work into the same checkout and role"
  default_prompt: "Create a durable carry-over and paste-ready cross-tool handoff for this repository, branch, checkpoint, role, chapter, dirty state, and next action, compatible with a fresh app-created worktree."

policy:
  allow_implicit_invocation: true
