interface:
  display_name: "Handoff"
  short_description: "Mid-task context carry-over note for when a session runs long or context fills up — distinct from Codex's built-in Handoff and the worker→CEO Completion Report"
  default_prompt: "Create a durable carry-over and paste-ready cross-tool handoff for this exact repo, worktree, branch, role, chapter, checkpoint, and next action."

policy:
  allow_implicit_invocation: true
